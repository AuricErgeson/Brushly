<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#3B82F6" />
  <title>Brushly — Toothbrushing Habit Tracker</title>
  <link rel="stylesheet" href="/api/static/style.css" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='52' font-size='52'%3E%F0%9F%AA%A5%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <main class="app" data-testid="app-root">
    <header class="hero">
      <div class="brand" data-testid="brand">
        <span class="brand-mark" aria-hidden="true">🪥</span>
        <span class="brand-name">Brushly</span>
      </div>

      <section class="streak" data-testid="streak-card">
        <div class="streak-number" data-testid="streak-count">0</div>
        <div class="streak-label">
          <span class="streak-flame" aria-hidden="true">🔥</span>
          <span data-testid="streak-label-text">day streak</span>
        </div>
        <p class="streak-tag" data-testid="streak-tag">Twice a day, every day.</p>
      </section>
    </header>

    <section class="actions" aria-label="Log a brush">
      <button class="brush-btn brush-btn--morning" data-testid="brush-morning-btn" type="button">
        <span class="brush-emoji" aria-hidden="true">🌅</span>
        <span class="brush-text">Morning</span>
      </button>
      <button class="brush-btn brush-btn--evening" data-testid="brush-evening-btn" type="button">
        <span class="brush-emoji" aria-hidden="true">🌙</span>
        <span class="brush-text">Evening</span>
      </button>
    </section>

    <section class="calendar-card">
      <div class="calendar-nav">
        <button class="nav-btn" data-testid="prev-month-btn" type="button" aria-label="Previous month">‹</button>
        <h2 class="calendar-title" data-testid="calendar-title">—</h2>
        <button class="nav-btn" data-testid="next-month-btn" type="button" aria-label="Next month">›</button>
      </div>

      <div class="dow-row" aria-hidden="true">
        <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
      </div>

      <div class="calendar-grid" data-testid="calendar-grid"></div>

      <ul class="legend" aria-label="Calendar legend">
        <li><span class="swatch swatch--0"></span> none</li>
        <li><span class="swatch swatch--1"></span> 1 brush</li>
        <li><span class="swatch swatch--2"></span> 2+ brushes</li>
      </ul>
    </section>

    <footer class="foot" data-testid="footer">
      <span>Your data stays on this device.</span>
    </footer>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite" data-testid="toast"></div>

  <script src="/api/static/app.js" defer></script>
</body>
</html>
